version: '3.8'

# Alternative configuration for Apple Silicon (ARM64)

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: traveller_postgres
    environment:
      POSTGRES_USER: traveller
      POSTGRES_PASSWORD: traveller
      POSTGRES_DB: traveller
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traveller -d traveller"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - transit_network

  redis:
    image: redis:7-alpine
    container_name: traveller_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transit_network

  adminer:
    image: adminer:4
    container_name: traveller_adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - transit_network

volumes:
  postgres_data:
  redis_data:

networks:
  transit_network:
    driver: bridge
